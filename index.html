<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#15111f" />
    <link rel="icon" href="data:," />
    <title>Echofall</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #15111f;
        overflow: hidden;
        /* Tactile : pas de scroll/zoom/sélection/surbrillance pendant le jeu. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* Invite à passer en paysage sur téléphone tenu à la verticale. */
      #rotate {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 9999;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 18px;
          text-align: center;
          padding: 28px;
          background: #15111f;
          color: #f6f0ff;
          font-family: Impact, "Arial Black", sans-serif;
        }
        #rotate .icon {
          font-size: 56px;
          animation: spin 2.4s ease-in-out infinite;
        }
        #rotate .msg {
          font-size: 22px;
          letter-spacing: 1px;
        }
      }
      @keyframes spin {
        0%, 60% { transform: rotate(0deg); }
        80%, 100% { transform: rotate(90deg); }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate">
      <div class="icon">⟳</div>
      <div class="msg">Tourne ton téléphone en mode paysage pour jouer</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
